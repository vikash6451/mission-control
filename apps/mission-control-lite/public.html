<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission Control — Public View</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background:#0b1020; color:#e6eaf2; }
      .row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
      .stack { display:grid; gap:12px; grid-template-columns: 1fr 1fr; margin: 18px 0; }
      .card { border:1px solid #2b3555; border-radius:10px; padding:12px; background:#111831; }
      select, button { padding:8px; border-radius:8px; border:1px solid #2b3555; background:#111831; color:#e6eaf2; }
      table { width:100%; border-collapse: collapse; margin-top:12px; }
      th, td { padding:10px; border-bottom:1px solid #26304e; text-align:left; font-size:14px; vertical-align: top; }
      .pill { padding:2px 8px; border-radius:999px; border:1px solid #425082; font-size:12px; }
      .task-desc { color:#c8d2ea; margin-top:6px; font-size:13px; white-space: pre-wrap; }
      .muted { color:#9aa4bf; font-size:12px; }
      ul { margin: 6px 0; padding-left: 18px; }
    </style>
  </head>
  <body>
    <h1>Mission Control — Public (Read-only)</h1>

    <div class="stack">
      <div class="card">
        <h3>Memory Stats</h3>
        <div id="memoryStats" class="muted">Loading…</div>
      </div>
      <div class="card">
        <h3>Memory Metrics</h3>
        <div id="memoryMetrics" class="muted">Loading…</div>
      </div>
    </div>

    <div class="card">
      <h3>Recent Memory Conflicts</h3>
      <ul id="memoryConflicts" class="muted"></ul>
    </div>

    <div class="row">
      <label>Lane <select id="laneFilter"><option value="">all</option><option>research</option><option>finance</option><option>sports</option><option>ops</option></select></label>
      <label>Status <select id="statusFilter"><option value="">all</option><option>backlog</option><option>in_progress</option><option>review</option><option>done</option></select></label>
      <button id="refreshBtn">Refresh</button>
    </div>

    <table>
      <thead><tr><th>Task</th><th>Lane</th><th>Status</th><th>Owner</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>

    <script>
      const BASE = "https://dutiful-goshawk-499.convex.site/mission-control";
      const esc = (v)=>String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");

      async function loadMemory() {
        const [statsRes, metricsRes] = await Promise.all([
          fetch(BASE + "/memory/stats"),
          fetch(BASE + "/memory/metrics"),
        ]);
        const stats = await statsRes.json();
        const metrics = await metricsRes.json();

        document.getElementById("memoryStats").innerHTML = `memories=${esc(stats?.totals?.memories)} | recalls=${esc(stats?.totals?.recalls)}<br>active=${esc(stats?.byStatus?.active)} superseded=${esc(stats?.byStatus?.superseded)} stale=${esc(stats?.byStatus?.stale)}`;
        const m = metrics?.metrics || {};
        document.getElementById("memoryMetrics").innerHTML = `reuse=${Number(m.recall_reuse_rate || 0).toFixed(2)} | contradictions=${esc(m.contradiction_resolution_count)}<br>reviewReject=${Number(m.review_rejection_proxy || 0).toFixed(2)} | ttr(ms)=${esc(m.avg_time_to_review_ms_proxy ?? 'n/a')} | tokenProxy=${esc(m.cost_token_proxy_total ?? 0)}`;

        const ul = document.getElementById("memoryConflicts");
        ul.innerHTML = "";
        (stats.recentConflicts || []).slice(0, 8).forEach(c => {
          const li = document.createElement("li");
          li.textContent = `${c.subjectKey}: ${String(c.content || '').slice(0, 140)}`;
          ul.appendChild(li);
        });
        if (!ul.children.length) ul.innerHTML = "<li>No recent conflicts</li>";
      }

      async function loadTasks() {
        const lane = document.getElementById("laneFilter").value;
        const status = document.getElementById("statusFilter").value;
        const url = new URL(BASE + "/tasks");
        if (lane) url.searchParams.set("lane", lane);
        if (status) url.searchParams.set("status", status);
        const res = await fetch(url);
        const data = await res.json();
        const rows = document.getElementById("rows");
        rows.innerHTML = "";
        (data.tasks || []).sort((a,b)=>b.updatedAt-a.updatedAt).forEach(t=>{
          const tr = document.createElement("tr");
          tr.innerHTML = `<td><div>${esc(t.title)}</div>
            <div class="task-desc">${esc(t.description||'')}</div>
            <div class="muted">Acceptance: ${esc(t.acceptanceCriteria||'')}</div>
            <div class="muted">Output: ${esc(t.outputFormat||'')}</div>
            <div class="muted">L3: minSources=${esc(t.minSources ?? 3)} | counterpoints=${t.requireCounterpoints === false ? 'no':'yes'}</div>
            ${t.dueAt ? `<div class="muted">Due: ${new Date(t.dueAt).toLocaleString()}</div>` : ""}
            ${t.contextPaths?.length ? `<div class="muted">Context: ${esc(t.contextPaths.join(', '))}</div>` : ""}
          </td><td><span class="pill">${esc(t.lane)}</span></td><td>${esc(t.status)}</td><td>${esc(t.ownerAgent || '-')}</td>`;
          rows.appendChild(tr);
        })
      }
      document.getElementById("refreshBtn").onclick = () => { loadTasks(); loadMemory(); };
      loadTasks();
      loadMemory();
    </script>
  </body>
</html>

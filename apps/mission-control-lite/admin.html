<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mission Control — Admin View</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background:#0b1020; color:#e6eaf2; }
      .row { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
      select, input, textarea, button { padding:8px; border-radius:8px; border:1px solid #2b3555; background:#111831; color:#e6eaf2; }
      textarea { min-height: 70px; min-width: 520px; }
      table { width:100%; border-collapse: collapse; margin-top:12px; }
      th, td { padding:10px; border-bottom:1px solid #26304e; text-align:left; font-size:14px; vertical-align: top; }
      .pill { padding:2px 8px; border-radius:999px; border:1px solid #425082; font-size:12px; }
      .muted { color:#9aa4bf; font-size:12px; }
      .task-desc { color:#c8d2ea; margin-top:6px; font-size:13px; white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <h1>Mission Control — Admin</h1>
    <p class="muted">Set Admin Key once per browser session.</p>

    <div class="row">
      <input id="adminKey" placeholder="Admin key" size="48" />
      <button id="saveKeyBtn">Save Key</button>
    </div>

    <div class="row">
      <label>Lane
        <select id="laneFilter"><option value="">all</option><option>research</option><option>finance</option><option>sports</option><option>ops</option></select>
      </label>
      <label>Status
        <select id="statusFilter"><option value="">all</option><option>backlog</option><option>in_progress</option><option>review</option><option>done</option></select>
      </label>
      <button id="refreshBtn">Refresh</button>
    </div>

    <div class="row">
      <input id="newTitle" placeholder="Task title" size="36" />
      <select id="newLane"><option>research</option><option>finance</option><option>sports</option><option>ops</option></select>
      <select id="newPriority"><option>medium</option><option>high</option><option>low</option></select>
      <input id="newMinSources" type="number" min="1" value="3" style="width:90px" title="Minimum sources" />
      <label style="display:flex;align-items:center;gap:6px"><input id="newRequireCounterpoints" type="checkbox" checked /> counterpoints</label>
      <input id="newDueAt" type="datetime-local" />
      <input id="newContextPaths" placeholder="Context paths (comma-separated, optional)" size="34" />
    </div>

    <div class="row"><textarea id="newDescription" placeholder="Description (required)"></textarea></div>
    <div class="row"><textarea id="newAcceptanceCriteria" placeholder="Acceptance criteria (required)"></textarea></div>
    <div class="row"><textarea id="newOutputFormat" placeholder="Output format (required)"></textarea></div>
    <div class="row"><button id="createBtn">Create Task</button></div>

    <table>
      <thead><tr><th>Task</th><th>Lane</th><th>Status</th><th>Owner</th><th>Action</th></tr></thead>
      <tbody id="rows"></tbody>
    </table>

    <script>
      const BASE = "https://adamant-cassowary-648.convex.site/mission-control";
      const statuses = ["backlog", "in_progress", "review", "done"];
      const getKey = () => localStorage.getItem("mc_admin_key") || "";
      const esc = (v)=>String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;").replace(/'/g,"&#39;");

      function saveKey(){ localStorage.setItem("mc_admin_key", document.getElementById("adminKey").value.trim()); alert("Saved"); }

      async function loadTasks() {
        const lane = document.getElementById("laneFilter").value;
        const status = document.getElementById("statusFilter").value;
        const url = new URL(BASE + "/tasks");
        if (lane) url.searchParams.set("lane", lane);
        if (status) url.searchParams.set("status", status);
        const res = await fetch(url);
        const data = await res.json();
        const rows = document.getElementById("rows");
        rows.innerHTML = "";
        (data.tasks || []).sort((a,b)=>b.updatedAt-a.updatedAt).forEach(t=>{
          const options = statuses.filter(s => s !== t.status).map(s=>`<option value="${s}">${s}</option>`).join("");
          const tr = document.createElement("tr");
          tr.innerHTML = `<td><div>${esc(t.title)}</div>
            <div class="task-desc">${esc(t.description||'')}</div>
            <div class="muted">Acceptance: ${esc(t.acceptanceCriteria||'')}</div>
            <div class="muted">Output: ${esc(t.outputFormat||'')}</div>
            <div class="muted">L3: minSources=${esc(t.minSources ?? 3)} | counterpoints=${t.requireCounterpoints === false ? 'no':'yes'}</div>
            ${t.dueAt ? `<div class="muted">Due: ${new Date(t.dueAt).toLocaleString()}</div>` : ""}
            ${t.contextPaths?.length ? `<div class="muted">Context: ${esc(t.contextPaths.join(', '))}</div>` : ""}
          </td><td><span class="pill">${esc(t.lane)}</span></td><td>${esc(t.status)}</td><td>${esc(t.ownerAgent || '-')}</td><td><select id="s-${t._id}">${options}</select><button onclick="moveStatus('${t._id}')">Move</button><button onclick="markBlocked('${t._id}')">Block</button></td>`;
          rows.appendChild(tr);
        });
      }

      async function createTask() {
        const title = document.getElementById("newTitle").value.trim();
        const lane = document.getElementById("newLane").value;
        const priority = document.getElementById("newPriority").value;
        const description = document.getElementById("newDescription").value.trim();
        const acceptanceCriteria = document.getElementById("newAcceptanceCriteria").value.trim();
        const outputFormat = document.getElementById("newOutputFormat").value.trim();
        const minSources = Number(document.getElementById("newMinSources").value || 3);
        const requireCounterpoints = document.getElementById("newRequireCounterpoints").checked;
        const dueAtRaw = document.getElementById("newDueAt").value;
        const dueAt = dueAtRaw ? new Date(dueAtRaw).getTime() : undefined;
        const contextPathsRaw = document.getElementById("newContextPaths").value.trim();
        const contextPaths = contextPathsRaw ? contextPathsRaw.split(",").map(s=>s.trim()).filter(Boolean) : undefined;

        if (!title || !description || !acceptanceCriteria || !outputFormat) return alert("Title, description, acceptance criteria, output format are required");
        const res = await fetch(BASE + "/tasks", {
          method: "POST",
          headers: { "content-type": "application/json", "x-admin-key": getKey() },
          body: JSON.stringify({ title, lane, priority, description, acceptanceCriteria, outputFormat, minSources, requireCounterpoints, dueAt, contextPaths })
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({error:"Create failed"}));
          return alert(`Create failed: ${err.error || 'check admin key'}`);
        }
        ["newTitle","newDescription","newAcceptanceCriteria","newOutputFormat","newDueAt","newContextPaths"].forEach(id=>document.getElementById(id).value="");
        document.getElementById("newMinSources").value = 3;
        document.getElementById("newRequireCounterpoints").checked = true;
        loadTasks();
      }

      async function moveStatus(taskId) {
        const status = document.getElementById(`s-${taskId}`).value;
        const actorAgent = prompt("actorAgent", "main-orchestrator") || "main-orchestrator";
        const res = await fetch(BASE + "/tasks/status", {
          method: "PATCH",
          headers: { "content-type": "application/json", "x-admin-key": getKey() },
          body: JSON.stringify({ taskId, status, actorAgent })
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({error:"Update failed"}));
          return alert(`Update failed: ${err.error || 'check admin key / actor role'}`);
        }
        loadTasks();
      }

      async function markBlocked(taskId) {
        const blockerReason = prompt("Blocker reason (required)");
        if (!blockerReason) return;
        const handoffToAgent = prompt("Handoff to agent (optional)", "");
        const handoffToLane = handoffToAgent ? prompt("Handoff lane (research|finance|sports|ops)", "ops") : "";
        const res = await fetch(BASE + "/tasks/blocked", {
          method: "POST",
          headers: { "content-type": "application/json", "x-admin-key": getKey() },
          body: JSON.stringify({ taskId, actorAgent: "research-agent", blockerReason, handoffToAgent: handoffToAgent || undefined, handoffToLane: handoffToLane || undefined })
        });
        if (!res.ok) {
          const err = await res.json().catch(()=>({error:"Block failed"}));
          return alert(`Block failed: ${err.error || 'check admin key'}`);
        }
        loadTasks();
      }

      document.getElementById("saveKeyBtn").onclick = saveKey;
      document.getElementById("refreshBtn").onclick = loadTasks;
      document.getElementById("createBtn").onclick = createTask;
      loadTasks();
    </script>
  </body>
</html>
